<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <title>السكن الوظيفي – معالجة Excel</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>

  <!-- الشريط العلوي -->
  <header class="topbar shadow-sm">
    <h1>📊 نظام معالجة Excel – السكن الوظيفي</h1>
  </header>

  <!-- القائمة -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 w-100 justify-content-around">
          <li class="nav-item"><a class="nav-link" href="../index.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="../All Branches/index.html">كل الأفرع</a></li>
          <li class="nav-item"><a class="nav-link" href="../Affiliation Track/index.html">الانتساب</a></li>
          <li class="nav-item"><a class="nav-link active" href="../Official Housing/index.html">السكن</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- المحتوى -->
  <main class="wrapper">

    <section class="panel shadow-lg">

      <h2>رفع ملف Excel</h2>
      <p>قم برفع ملف Excel ليتم تقسيم المحافظات تلقائيًا وترتيب المهام.</p>

      <label class="file-label" for="fileInput">
        اختر ملف Excel
      </label>
      <input type="file" id="fileInput" accept=".xlsx">

      <button id="processBtn" class="process-btn">معالجة الملف</button>

      <div id="status" class="status-box">بانتظار رفع الملف...</div>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
