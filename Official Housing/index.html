  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>

  <!-- الشريط العلوي -->
  <header class="topbar shadow-sm">
    <h1>📊 نظام معالجة Excel – السكن الوظيفي</h1>
  </header>

  <!-- القائمة -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 w-100 justify-content-around">
          <li class="nav-item"><a class="nav-link" href="../index.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="../All Branches/index.html">كل الأفرع</a></li>

        </ul>

  <!-- المحتوى -->
  <main class="wrapper">

    <section class="panel shadow-lg">

      <h2>رفع ملف Excel</h2>
      <p>قم برفع ملف Excel ليتم تقسيم المحافظات تلقائيًا وترتيب المهام.</p>

      <label class="file-label" for="fileInput">
        اختر ملف Excel
      </label>
      <input type="file" id="fileInput" accept=".xlsx">

      <div class="selected-file" id="selectedFile">
        <div class="selected-file-title">الملف المختار</div>
        <div class="empty-file">لم يتم اختيار أي ملف بعد.</div>
      </div>

      <button id="processBtn" class="process-btn">معالجة الملف</button>

      <div id="status" class="status-box">بانتظار رفع الملف...</div>

    </section>

  </main>

  <script src="script.js"></script>
