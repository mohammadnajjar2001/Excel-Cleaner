<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Excel Cleaner - الرئيسية</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    header {
      background: #111827;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px;
      text-align: center;
    }

    .title {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      transition: 0.2s;
      border: 1px solid #e5e7eb;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
      color: #6b7280;
    }

    footer {
      margin-top: 50px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
    }
  </style>

</head>

<body>

<header>
  📊 Excel Cleaner Dashboard
</header>

<div class="container">

  <div class="title">مرحباً 👋</div>
  <div class="subtitle">اختر نوع المعالجة التي تريد العمل عليها</div>

  <div class="grid">

    <a class="card" href="Affiliation Track/index.html">
      <div class="icon">📁</div>
      <h3>فرع الانتساب</h3>
      <p>تتبع الانتسابات والبيانات المرتبطة</p>
    </a>

    <a class="card" href="All Branches/index.html">
      <div class="icon">🏢</div>
      <h3>جميع الفروع</h3>
      <p>معالجة جميع الفروع وتنظيم البيانات</p>
    </a>

    <a class="card" href="Official Housing/index.html">
      <div class="icon">🏠</div>
      <h3>السكن الوظيفي</h3>
      <p>بيانات السكن الرسمي والتوزيع</p>
    </a>

  </div>

  <footer>
    Mohammed Nassan Najjar System © 2026
  </footer>

</div>

</body>
</html>
